name: pix2pixhd
generator:
  ngf: 64             # base channel width
  n_downsampling: 3   # encoder depth: 256→128→64→32 bottleneck
  n_blocks: 9         # ResNet residual blocks (paper specifies 9)
discriminator:
  base_features: 64
  n_scales: 3         # 3-scale PatchGAN as in paper
  spectral_norm: true # spectral norm on D as in paper
