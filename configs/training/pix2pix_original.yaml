epochs: 200
batch_size: 1
lr_generator: 0.0002
lr_discriminator: 0.0002  # paper: same LR for G and D
beta1: 0.5
beta2: 0.999
loss_type: bce            # original pix2pix uses log loss (BCE)
label_smoothing: 1.0      # no label smoothing in paper
lambda_l1: 100.0
lambda_gp: 0.0            # no gradient penalty in pix2pix paper
save_every: 10
sample_every: 5
log_every: 100
num_workers: 4
