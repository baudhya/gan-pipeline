repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff lint
        entry: ruff check
        language: system
        args: [src, tests, scripts]
        pass_filenames: false
        always_run: true

      - id: black
        name: black format check
        entry: black --check
        language: system
        args: [src, tests, scripts]
        pass_filenames: false
        always_run: true

      - id: isort
        name: isort import check
        entry: isort --check-only
        language: system
        args: [src, tests, scripts]
        pass_filenames: false
        always_run: true

      - id: mypy
        name: mypy type check
        entry: mypy
        language: system
        args: [src]
        pass_filenames: false
        always_run: true
