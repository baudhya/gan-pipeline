name: ruff

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: ruff
        run: ruff check src tests scripts

      - name: black
        run: black --check src tests scripts

      - name: isort
        run: isort --check-only src tests scripts
